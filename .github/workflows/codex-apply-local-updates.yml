          git apply /tmp/local-game-updates.patch
          rm -f .github/workflows/codex-apply-local-updates.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md app.js games/mad-libs.js games/starfighter-sinistar.js service-worker.js styles.css .github/workflows/codex-apply-local-updates.yml
          git diff --cached --check
          git commit -m "Publish local game updates"
          git push
